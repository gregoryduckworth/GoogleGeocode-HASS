name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: patch
        type: choice
        options: [patch, minor, major]

permissions:
  contents: write

concurrency:
  group: release

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.ref_name == 'main'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate next version
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: ${{ github.event.inputs.bump }}
          release_branches: main
          dry_run: false

      - name: Update manifest.json
        run: |
          jq --arg v "${{ steps.tag.outputs.new_version }}" \
            '.version = $v' custom_components/google_geocode/manifest.json \
            > /tmp/manifest.json
          mv /tmp/manifest.json custom_components/google_geocode/manifest.json

      - name: Commit version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/google_geocode/manifest.json
          git commit -m "chore: release v${{ steps.tag.outputs.new_version }}"
          git push origin main

      - name: Create tag
        run: |
          git tag "v${{ steps.tag.outputs.new_version }}"
          git push origin "v${{ steps.tag.outputs.new_version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.tag.outputs.new_version }}"
          name: "v${{ steps.tag.outputs.new_version }}"
          generate_release_notes: true
