name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: patch
        type: choice
        options: [patch, minor, major]

permissions:
  contents: write

concurrency:
  group: release

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.ref_name == 'main'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: next
        uses: zwaldowski/semver-release-action@v4
        with:
          bump: ${{ github.event.inputs.bump }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prefix: v
          dry_run: true

      - name: Update manifest.json and commit
        id: commit
        run: |
          jq --arg v "${{ steps.next.outputs.version }}" \
            '.version = $v' custom_components/google_geocode/manifest.json \
            > /tmp/manifest.json
          mv /tmp/manifest.json custom_components/google_geocode/manifest.json
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/google_geocode/manifest.json
          git commit -m "chore: release ${{ steps.next.outputs.version_tag }}"
          git push origin main
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        uses: zwaldowski/semver-release-action@v4
        with:
          bump: ${{ github.event.inputs.bump }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prefix: v
          sha: ${{ steps.commit.outputs.sha }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.next.outputs.version_tag }}
          name: ${{ steps.next.outputs.version_tag }}
          generate_release_notes: true
